<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Footer overlay — preventivo template</title>
<style>
/*
  Footer overlay — Lavder preventivo template
  -------------------------------------------
  Single-page A4 document. The <footer> element is absolutely positioned at
  the bottom of the page. pypdf stamps this single page onto the LAST page of
  the main PDF, so the footer lands at the bottom of the closing page even
  when the main content stops mid-page.

  Footer copy convention:
  - Direct deal:   "LAVDER ENTERPRISE · Documento riservato a [Cliente] · Tutti gli importi sono IVA esente"
  - White-label:   "LAVDER ENTERPRISE · Documento riservato a [Agenzia] Srl · Tutti gli importi sono IVA esente"
    (the end-client never appears in the footer — only in the cover Riferimento field)
*/

@font-face {
  font-family: "Inter";
  font-weight: 100 900;
  font-display: swap;
  src: url("file:///Users/giacomo/Claude/Lavder%20Branding/lavder-branding/assets/fonts/Inter/Inter-VariableFont_opsz,wght.ttf") format("truetype-variations");
}

:root {
  --lvdr-ink: #111113;
  --lvdr-n200: #E4E4E7;
  --lvdr-n500: #71717A;
}

@page {
  size: A4;
  margin: 18mm 16mm 18mm 16mm;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  height: 100vh;
  position: relative;
  font-family: "Inter", sans-serif;
}

footer {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  padding-top: 16px;
  border-top: 1px solid var(--lvdr-n200);
  font-size: 8.5pt;
  color: var(--lvdr-n500);
  display: flex;
  justify-content: space-between;
  align-items: center;
}

footer .legal { font-family: "Inter"; }

footer .lvdr-tag {
  display: flex;
  align-items: center;
}

footer .lvdr-tag svg {
  width: 14px;
  height: auto;
  display: block;
  fill: var(--lvdr-ink);
}
</style>
</head>
<body>

<footer>
  <div class="legal">LAVDER ENTERPRISE · Documento riservato a [Cliente Destinatario Srl] · Tutti gli importi sono IVA esente</div>
  <div class="lvdr-tag">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 241.77 397.51">
      <path d="M442,341.25V636H558.19l47.35,102.8h78.22L627,623.94s60.62-23.19,50.56-94.42-56.29-82-119.56-84.78v56.43s42.74,0,46.37,38.55c0,0,2.51,40.78-39.53,38.55H507.21v-237Z" transform="translate(-441.98 -341.25)"/>
    </svg>
  </div>
</footer>

</body>
</html>
